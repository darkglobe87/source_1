name: Build debug APK

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # This repo doesn't have a committed Gradle wrapper, so bootstrap one
      # from whatever Gradle is preinstalled on the runner before building.
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version latest

      - name: Enable Gradle build caching
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Debug builds fall back to the auto-generated debug keystore (see
      # app/build.gradle.kts), so no signing secrets are needed here. The
      # secrets Gradle plugin also falls back to .env.example when .env is
      # absent, so GEMINI_API_KEY doesn't need to be configured either.
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bad-plots-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
